<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OVERKILL.TECHNO // QUARANTINE ZONE</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0A0A08;
    --panel:#1A1917;
    --text:#E8E4DC;
    --muted:#7A7875;
    --red:#CC2A2A;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial,sans-serif;
}

.container{
    width:min(700px,90%);
    text-align:center;
}

.warning-img{
    width:200px;
    height:200px;
    object-fit:contain;

    opacity:.9;

    margin-bottom:30px;
}

.title{
    font-family:'Barlow Condensed',sans-serif;
    font-size:4rem;
    letter-spacing:2px;

    color:var(--red);

    margin-bottom:15px;
}

.subtitle{
    font-family:'Share Tech Mono',monospace;
    color:var(--muted);

    margin-bottom:30px;

    line-height:1.8;
}

.back-button{

    display:inline-block;

    padding:14px 28px;

    background:var(--panel);

    color:var(--text);

    text-decoration:none;

    font-family:'Share Tech Mono',monospace;

    border-left:4px solid transparent;

    transition:.2s;
}

.back-button:hover{

    border-left:4px solid var(--red);

    transform:translateX(4px);
}

.footer{

    margin-top:40px;

    color:var(--muted);

    font-family:'Share Tech Mono',monospace;

    font-size:12px;
}

@media(max-width:768px){

    .warning-img{
        width:140px;
        height:140px;
    }

    .title{
        font-size:2.5rem;
    }

}

</style>

</head>

<body>

<div class="container">

    <img src="img/misc/peligro.png"
         alt="BIOHAZARD"
         class="warning-img">

    <div class="title">
        Fuera de zona
    </div>

    <div class="subtitle">

        SIGNAL LOST // ACCESS RESTRICTED<br>
        THIS SECTOR IS CURRENTLY OFFLINE<br>
        TRANSMISSION UNDER RECONSTRUCTION

    </div>

    <a href="index.html" class="back-button">

        REGRESAR AL INICIO

    </a>

    <div class="footer">

        OVERKILL.TECHNO // LIMA-01

    </div>

</div>

</body>

</html>
