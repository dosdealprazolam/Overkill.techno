<!DOCTYPE html>
<html lang="es">

<head>

<title>OVERKILL.TECHNO // LOCALS</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0A0A08;
    --panel:#1A1917;
    --card:#2E2D2A;
    --text:#E8E4DC;
    --muted:#7A7875;
    --red:#CC2A2A;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
}

.container{
    width:min(1000px,90%);
    margin:auto;
    padding:30px 0 60px;
}

.back-link{
    display:inline-block;
    margin-bottom:30px;
    text-decoration:none;
    color:var(--red);
    font-family:'Share Tech Mono', monospace;
    letter-spacing:1px;
}

.back-link:hover{
    color:var(--text);
}

.header{
    margin-bottom:40px;
}

.page-title{
    font-family:'Barlow Condensed',sans-serif;
    font-size:3rem;
    letter-spacing:2px;
}

.page-subtitle{
    color:var(--muted);
    font-family:'Share Tech Mono',monospace;
    font-size:12px;
    margin-top:5px;
}

.locals-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.local-card{
    text-decoration:none;
    color:var(--text);
}

.local-card img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    filter:grayscale(100%);
    transition:.3s;
}

.local-card:hover img{
    transform:scale(1.02);
    filter:grayscale(0%);
}

.local-name{
    margin-top:10px;
    text-align:center;
    font-family:'Barlow Condensed',sans-serif;
    font-size:1.5rem;
    letter-spacing:1px;
}

.local-card:hover .local-name{
    color:var(--red);
}

.local-code{
    text-align:center;
    color:var(--muted);
    font-family:'Share Tech Mono',monospace;
    font-size:11px;
    margin-top:4px;
}

.footer{
    margin-top:60px;
    padding-top:20px;
    border-top:1px solid var(--card);
    color:var(--muted);
    font-family:'Share Tech Mono',monospace;
    font-size:12px;
}

@media(max-width:768px){

    .locals-grid{
        grid-template-columns:repeat(2,1fr);
        gap:15px;
    }

    .page-title{
        font-size:2rem;
    }

    .local-name{
        font-size:1.2rem;
    }

}

</style>
</head>
